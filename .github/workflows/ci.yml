name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r api/requirements-api.txt
          pip install pytest httpx          # test runner + FastAPI TestClient transport

      - name: Run tests
        # `python -m pytest` puts the repo root on sys.path so `from src import ...`,
        # `from eval import ...`, and `from api import ...` resolve. No secrets needed:
        # every test runs offline (fake chat clients, fixtures, synthetic models).
        run: python -m pytest tests/ -q
